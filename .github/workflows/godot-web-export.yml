name: Godot Web Export

on:
  push:
    branches: [main]
    paths:
      - "godot/**"
      - ".github/workflows/godot-web-export.yml"
      - "scripts/patch_web_export.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.3"
          use-dotnet: false
          include-templates: true

      - name: Export Web
        run: |
          cd godot
          godot --headless --path . --export-release "Web" ../docs/index.html

      - name: Cache bust + reload button (web)
        run: python scripts/patch_web_export.py docs/index.html "${{ github.sha }}"

      - name: Commit web export to main (GitHub Pages /docs)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update web export [skip ci]"
          git push

      - name: Publish to gh-pages (mirror)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true